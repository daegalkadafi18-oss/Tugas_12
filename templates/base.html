<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Beras.SCAN — Klasifikasi Jenis Beras{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="grain-field" aria-hidden="true"></div>

<header class="topbar">
  <a class="brand" href="/">
    <svg class="brand-mark" width="22" height="22" viewBox="0 0 22 22" fill="none">
      <ellipse cx="11" cy="11" rx="5" ry="9" transform="rotate(20 11 11)" fill="currentColor"/>
    </svg>
    <span class="brand-text">Beras<span class="dot">.</span>SCAN</span>
  </a>
  <nav class="nav">
    <a href="/" class="{{ 'active' if request.path == '/' else '' }}">Pindai Beras</a>
    <a href="/about" class="{{ 'active' if request.path == '/about' else '' }}">Cara Kerja Model</a>
  </nav>
</header>

<main>
  {% block content %}{% endblock %}
</main>

<footer class="footer">
  <p>Tugas Akhir — Penerapan Transfer Learning Xception untuk Klasifikasi Jenis Beras Berbasis Web (Flask)</p>
</footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
